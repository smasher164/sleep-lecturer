app = "sleep-lecturer"
primary_region = "iad"

[build]

[env]
  AUDIO_CACHE_DIR = "/data/audio_cache"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "audio_data"
  destination = "/data"
